services:
  - type: web
    name: workzap
    env: php
    plan: free
    buildCommand: composer install --no-dev && npm install && npm run build && php artisan storage:link --force && php artisan migrate --force
    startCommand: php artisan serve --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
